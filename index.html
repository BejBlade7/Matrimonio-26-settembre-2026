:root{
--green-main:#9caf9c;
--green-light:#e6efe6;
--beige:#f5f1ec;
--text-dark:#3a3a3a;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:var(--beige);
color:var(--text-dark);
overflow-x:hidden;
}

/* SFONDO DECORATIVO ULIVO */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url('https://www.transparenttextures.com/patterns/leaf.png');
opacity:0.04;
pointer-events:none;
z-index:-1;
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
background:rgba(255,255,255,0.95);
box-shadow:0 4px 10px rgba(0,0,0,0.05);
z-index:1000;
}

.nav-container{
max-width:1100px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
}

.logo{
font-family:'Playfair Display',serif;
color:var(--green-main);
font-size:20px;
}

.menu{
position:relative;
}

.menu-button{
cursor:pointer;
font-weight:500;
color:var(--green-main);
}

.dropdown{
display:none;
position:absolute;
right:0;
top:28px;
background:white;
border-radius:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
overflow:hidden;
}

.dropdown div{
padding:12px 18px;
cursor:pointer;
white-space:nowrap;
}

.dropdown div:hover{
background:var(--green-light);
}

/* SEZIONI CON TRANSIZIONE */
section{
padding:110px 20px 80px 20px;
max-width:1100px;
margin:auto;
opacity:0;
transform:translateY(15px);
transition:opacity 0.6s ease, transform 0.6s ease;
position:absolute;
left:0;
right:0;
}

section.active{
opacity:1;
transform:translateY(0);
position:relative;
}

margin-bottom:20px;
}
